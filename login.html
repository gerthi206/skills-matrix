<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillsBase — Sign In</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#2563eb;--primary-hover:#1d4ed8;--primary-light:#eff6ff;--danger:#dc2626;--success:#16a34a;--border:#e2e8f0;--muted:#64748b;--subtle:#94a3b8;--text:#0f172a}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 40%,#2563eb 70%,#3b82f6 100%);padding:20px}
.card{background:#fff;border-radius:16px;width:420px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,.2);overflow:hidden}
.card-top{padding:28px 32px 0}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.brand-icon{width:36px;height:36px;background:var(--primary);border-radius:9px;display:flex;align-items:center;justify-content:center}
.brand-name{font-size:18px;font-weight:800;color:var(--text)}.brand-name span{color:var(--primary)}
.card-body{padding:0 32px 28px}
h2{font-size:20px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.3px}
.sub{font-size:13.5px;color:var(--muted);margin-bottom:22px;line-height:1.5}
.form-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.form-input{padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;background:#fff;width:100%}
.form-input:focus{border-color:var(--primary)}
.form-input.error{border-color:var(--danger)}
.pwd-wrap{position:relative}
.pwd-wrap .form-input{padding-right:42px}
.pwd-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--subtle);background:none;border:none;padding:2px;display:flex;align-items:center}
.pwd-eye:hover{color:var(--text)}
.err-msg{font-size:12.5px;color:var(--danger);display:none;margin-top:4px}
.err-msg.show{display:block}
.submit-btn{width:100%;padding:11px;border-radius:9px;border:none;background:var(--primary);color:#fff;font-size:14.5px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px}
.submit-btn:hover{background:var(--primary-hover)}
.submit-btn:disabled{background:#93c5fd;cursor:not-allowed}

/* Demo panel */
.demo-panel{margin:0 32px 24px;background:#fefce8;border:1.5px solid #fde047;border-radius:10px;padding:14px}
.demo-panel h4{font-size:12px;font-weight:800;color:#92400e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.demo-user{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.demo-user:last-child{margin-bottom:0}
.demo-user-info{font-size:12.5px;color:#78350f}
.demo-user-info strong{color:#451a03}
.demo-fill{font-size:11.5px;background:#fff;color:var(--primary);border:1px solid #93c5fd;border-radius:6px;padding:3px 9px;cursor:pointer;font-weight:600;white-space:nowrap}
.demo-fill:hover{background:var(--primary-light)}

/* Success screen */
.success-screen{display:flex;flex-direction:column;align-items:center;padding:8px 0 8px;text-align:center}
.success-icon{width:64px;height:64px;border-radius:50%;background:#f0fdf4;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

/* Spinner */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.step-panel{display:none}.step-panel.active{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="brand">
      <div class="brand-icon"><svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
      <div class="brand-name">Skills<span>Base</span></div>
    </div>
  </div>

  <div class="card-body">
    <!-- Sign In -->
    <div class="step-panel active" id="panel-signin">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to continue</p>
      <div class="form-field">
        <label class="form-label">Email address</label>
        <input class="form-input" id="emailInput" type="email" placeholder="you@company.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <div class="pwd-wrap">
          <input class="form-input" id="pwdInput" type="password" placeholder="Enter your password" autocomplete="current-password">
          <button class="pwd-eye" onclick="togglePwd()" tabindex="-1" id="eyeBtn">
            <svg id="eyeIcon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="err-msg" id="signinErr">Invalid email or password.</div>
      <button class="submit-btn" id="signinBtn" onclick="handleSignin()">Sign In</button>
    </div>

    <!-- Success -->
    <div class="step-panel" id="panel-success">
      <div class="success-screen">
        <div class="success-icon">
          <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2>Signed in!</h2>
        <p class="sub" style="margin-bottom:8px">Redirecting you now…</p>
      </div>
    </div>
  </div>

  <!-- Demo credentials panel -->
  <div class="demo-panel" id="demoPanel">
    <h4>
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="#92400e" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Demo Credentials
    </h4>
    <div class="demo-user">
      <div class="demo-user-info"><strong>admin@company.com</strong> / Admin123! &nbsp;·&nbsp; Administrator</div>
      <button class="demo-fill" onclick="fillDemo('admin@company.com','Admin123!')">Fill</button>
    </div>
    <div class="demo-user">
      <div class="demo-user-info"><strong>carol@company.com</strong> / Carol123! &nbsp;·&nbsp; Employee</div>
      <button class="demo-fill" onclick="fillDemo('carol@company.com','Carol123!')">Fill</button>
    </div>
    <div class="demo-user">
      <div class="demo-user-info"><strong>alice@company.com</strong> / Alice123! &nbsp;·&nbsp; Manager</div>
      <button class="demo-fill" onclick="fillDemo('alice@company.com','Alice123!')">Fill</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
// CRYPTO — password hashing
// ════════════════════════════════════════════════════
const SALT = 'skillsbase_2fa_salt_v1:';

async function sha256(str) {
  const data = new TextEncoder().encode(SALT + str);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ════════════════════════════════════════════════════
// AUTH DATA
// ════════════════════════════════════════════════════
const AUTH_KEY = 'sbAuthData';
const SESS_KEY = 'sbSession';
const SESSION_HOURS = 8;

function loadAuth() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; }
}
function saveAuth(d) { localStorage.setItem(AUTH_KEY, JSON.stringify(d)); }

async function initAuth() {
  let auth = loadAuth();
  if (auth && auth.initialized) return auth;
  auth = {
    initialized: true,
    users: [
      { id: 1, email: 'admin@company.com', passwordHash: await sha256('Admin123!'), name: 'Admin User', role: 'admin', memberId: null },
      { id: 2, email: 'carol@company.com', passwordHash: await sha256('Carol123!'), name: 'Carol Davis', role: 'employee', memberId: 3 },
      { id: 3, email: 'alice@company.com', passwordHash: await sha256('Alice123!'), name: 'Alice Johnson', role: 'manager', memberId: 1 },
    ],
  };
  saveAuth(auth);
  return auth;
}

function createSession(user) {
  sessionStorage.setItem(SESS_KEY, JSON.stringify({
    userId: user.id, name: user.name,
    role: user.role, memberId: user.memberId,
    expires: Date.now() + SESSION_HOURS * 3600 * 1000,
  }));
}

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let AUTH = null;

// ════════════════════════════════════════════════════
// SIGN IN
// ════════════════════════════════════════════════════
async function handleSignin() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  const pwd = document.getElementById('pwdInput').value;
  const errEl = document.getElementById('signinErr');
  const btn = document.getElementById('signinBtn');

  errEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  const hash = await sha256(pwd);
  const user = AUTH.users.find(u => u.email.toLowerCase() === email && u.passwordHash === hash);

  btn.disabled = false;
  btn.textContent = 'Sign In';

  if (!user) { errEl.classList.add('show'); return; }

  createSession(user);
  showPanel('success');
  document.getElementById('demoPanel').style.display = 'none';
  setTimeout(() => { window.location.replace((user.role === 'admin' || user.role === 'manager') ? 'admin.html' : 'user.html'); }, 1000);
}

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════
function showPanel(id) {
  document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
}

function togglePwd() {
  const inp = document.getElementById('pwdInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    inp.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

function fillDemo(email, pwd) {
  document.getElementById('emailInput').value = email;
  document.getElementById('pwdInput').value = pwd;
}

// Keyboard shortcuts
document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignin(); });
document.getElementById('emailInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pwdInput').focus(); });

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
(async function() {
  // Redirect if already logged in
  try {
    const sess = JSON.parse(sessionStorage.getItem(SESS_KEY) || 'null');
    if (sess && sess.expires > Date.now()) {
      window.location.replace((sess.role === 'admin' || sess.role === 'manager') ? 'admin.html' : 'user.html');
      return;
    }
  } catch {}
  AUTH = await initAuth();
})();
</script>
</body>
</html>
